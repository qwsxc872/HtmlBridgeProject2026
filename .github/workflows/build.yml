name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # این باعث میشه بتونی دستی اجراش کنی

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libstdc++-12-dev \
          python3-pip
        pip3 install --upgrade pip
        pip3 install buildozer cython

    - name: Build with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: HtmlBridge-APK
        path: bin/*.apk
