name: Build APK with p4a (Backup)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev
          pip3 install python-for-android cython
      
      - name: Build with p4a
        run: |
          p4a apk \
            --requirements=python3,kivy \
            --private=. \
            --package=org.test.htmlbridge \
            --name="HtmlBridge" \
            --version=1.0 \
            --bootstrap=sdl2 \
            --dist-name=htmlbridge \
            --android-api=34 \
            --arch=arm64-v8a \
            --permission=INTERNET \
            --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HtmlBridge-APK-p4a
          path: *.apk
