name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kivy/buildozer:latest

    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          yes | buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
