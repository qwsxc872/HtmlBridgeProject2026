name: Build APK (Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Build APK
        uses: docker://kivy/buildozer:latest
        with:
          args: buildozer android debug

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk
          path: |
            bin/*.apk
            **/*.apk
