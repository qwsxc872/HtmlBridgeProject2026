name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      - name: Setup Android SDK
        uses: android-actions/setup-android@v3


      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses || true

          sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;35.0.0"


      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip

          pip install \
          buildozer==1.5.0 \
          cython==0.29.37


      - name: Prepare Buildozer environment
        run: |

          mkdir -p ~/.buildozer/android/platform

          rm -rf ~/.buildozer/android/platform/android-sdk


          ln -s \
          $ANDROID_HOME \
          ~/.buildozer/android/platform/android-sdk


          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses


          cp -r \
          $ANDROID_HOME/licenses/* \
          ~/.buildozer/android/platform/android-sdk/licenses/ \
          || true


          echo "ANDROID SDK:"
          ls ~/.buildozer/android/platform/android-sdk


          echo "SDKMANAGER:"
          which sdkmanager

          sdkmanager --version


      - name: Fix Java JAXB issue
        run: |

          sudo apt-get update

          sudo apt-get install -y \
          libjaxb-api-java


          echo "JAXB installed"


      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
          ANDROIDSDK: ~/.buildozer/android/platform/android-sdk
          ANDROID_HOME: ~/.buildozer/android/platform/android-sdk
          ANDROIDAPI: 34
          ANDROIDMINAPI: 24

        run: |

          buildozer android clean

          buildozer -v android debug


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:

          name: HtmlBridge-debug-apk

          path: bin/*.apk
