name: Build APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Android
        uses: android-actions/setup-android@v3


      - name: Use Java 11
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/temurin-11-jdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/temurin-11-jdk-amd64/bin" >> $GITHUB_PATH


      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37

      - name: Install Android Build Tools
        run: |
          sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;35.0.0" \
          "build-tools;37.0.0"

      - name: Prepare Buildozer SDK
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin

          SDKMANAGER=$(find $ANDROID_HOME -name sdkmanager | head -1)

          echo "SDKMANAGER=$SDKMANAGER"

          ln -sf "$SDKMANAGER" \
          ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses

          cp -r $ANDROID_HOME/licenses/* \
          ~/.buildozer/android/platform/android-sdk/licenses/ || true

      - name: Prepare Buildozer SDK licenses
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d1fee" >> ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build APK
        env:
          BUILDOZER_WARN_ON_ROOT: 0
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
